name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  dikon:
    name: Dikon
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Test types
        run: pnpm test:types

  examples:
    name: Example (${{ matrix.name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: react-simple
            path: examples/react-simple
          - name: react-complex
            path: examples/react-complex

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ matrix.path }}/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: ${{ matrix.path }}
        run: pnpm lint

      - name: Typecheck and build
        working-directory: ${{ matrix.path }}
        run: pnpm build

      - name: Test
        working-directory: ${{ matrix.path }}
        run: pnpm test
